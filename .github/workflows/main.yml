name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flet
    
    - name: Build APK (non-interactive)
      run: |
        # Автоматический ответ "yes" на все вопросы
        echo "y" | flet build apk --org com.example.anketa --out-dir build || true
    
    - name: Find APK file
      id: find_apk
      run: |
        # Ищем APK файл в любом месте
        apk=$(find . -name "*.apk" | head -1)
        if [ -z "$apk" ]; then
          echo "APK not found"
          exit 1
        fi
        echo "apk_path=$apk" >> $GITHUB_OUTPUT
        echo "Found APK at: $apk"
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: my-app-apk
        path: ${{ steps.find_apk.outputs.apk_path }}
        
