name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.9'
        channel: 'stable'
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install Flet
      run: |
        pip install flet
    
    - name: Create Flet project
      run: |
        # Создаем временную папку для проекта
        mkdir -p temp_project
        cp main.py temp_project/
        cd temp_project
        # Инициализируем Flet проект
        flet create --project-name myapp .
        # Копируем наш main.py в папку src
        cp ../main.py src/main.py
    
    - name: Build APK
      run: |
        cd temp_project
        # Запускаем сборку без интерактива
        flutter clean
        flutter pub get
        cd ..
        # Используем flet build с правильными параметрами
        flet build apk --no-interactive --org com.example.myapp || echo "Build finished"
        
    - name: Fix and build directly
      run: |
        # Альтернативный метод - создаем простой проект
        mkdir -p simple_build
        cd simple_build
        cat > pubspec.yaml << 'EOF'
        name: myapp
        description: A Flet app
        version: 1.0.0
        environment:
          sdk: '>=3.0.0 <4.0.0'
        dependencies:
          flutter:
            sdk: flutter
          flet: ^0.20.0
        flutter:
          uses-material-design: true
        EOF
        
        cat > main.dart << 'EOF'
        import 'package:flutter/material.dart';
        import 'package:flet/flet.dart';
        
        void main() async {
          await FletApp.initialize();
          runApp(FletApp(file: 'main.py'));
        }
        EOF
        
        # Копируем main.py
        cp ../main.py .
        
        # Собираем
        flutter pub get
        flutter build apk --release
        cd ..
        
    - name: Find APK files
      run: |
        echo "Searching for APK files..."
        find . -name "*.apk" -type f
        find . -name "*.apk" -exec cp {} ./app.apk \; 2>/dev/null || echo "No APK found in subdirectories"
        # Проверяем стандартные пути Flutter
        if [ -f "build/app/outputs/flutter-apk/app-release.apk" ]; then
          cp build/app/outputs/flutter-apk/app-release.apk app.apk
        fi
        if [ -f "simple_build/build/app/outputs/flutter-apk/app-release.apk" ]; then
          cp simple_build/build/app/outputs/flutter-apk/app-release.apk app.apk
        fi
        ls -la *.apk 2>/dev/null || echo "Still no APK found"
    
    - name: Upload APK
      if: success() || failure()
      uses: actions/upload-artifact@v4
      with:
        name: apk-files
        path: |
          **/*.apk
          app.apk
